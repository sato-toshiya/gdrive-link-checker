name: DokuWiki Link Checker (learner)

on:
  schedule:
    - cron: '10 0 * * 1'  # supportの10分後（毎週月曜朝9:10）に自動実行
  workflow_dispatch:      # ボタンを押して手動でいつでも実行可能

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 💡 外部プラグインを使わず、Linux標準のscpコマンドで安全にダウンロードします
    - name: Download DokuWiki pages
      env:
        SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        echo "$SSH_KEY" > private_key.pem
        chmod 400 private_key.pem
        mkdir -p wiki_data_learner
        scp -P 8022 -i private_key.pem -r -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/c6600173/public_html/learner.codeofgenius.net/data/pages ./wiki_data_learner
        rm -f private_key.pem

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Link Checker
      env:
        WIKI_DATA_DIR: 'wiki_data_learner/pages' # 💡scpの挙動に合わせてパスを調整
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        GAS_SECURITY_TOKEN: ${{ secrets.GAS_SECURITY_TOKEN }}
      run: python link_checker.py