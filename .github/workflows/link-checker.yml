name: DokuWiki Link Checker (GAS Webhook)

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜日の朝9時（日本時間）に自動実行
  workflow_dispatch:      # ボタンを押して手動でいつでも実行可能

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードを準備
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. ConoHaサーバーから秘密鍵(SSH)を使って data/pages/ をダウンロード
    - name: Download DokuWiki pages
      uses: garygrossgarten/github-action-sftp@release
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        privateKey: ${{ secrets.SERVER_SSH_KEY }} # ConoHaの秘密鍵
        relative: true
        remote: 'path/to/dokuwiki/data/pages/'   # ⚠️DokuWikiの実際のパスに変えてください
        local: 'wiki_data/'
        command: 'download'

    # 3. Pythonの環境構築
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. ライブラリのインストール（GASがAPI処理を代行するため、これだけでOK！）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 5. GASのURLを暗号化されたままPythonに渡して実行
    - name: Run Link Checker
      env:
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        GAS_SECURITY_TOKEN: ${{ secrets.GAS_SECURITY_TOKEN }}
      run: python link_checker.py