name: DokuWiki Link Checker (support)

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 💡 1. 前回のダウンロードデータをクラウドから復元する設定を追加
    - name: Cache Wiki Data
      uses: actions/cache@v4
      with:
        path: wiki_data_support
        key: wiki-data-support-${{ github.run_id }}
        restore-keys: |
          wiki-data-support-

    # 💡 2. scpを廃止し、差分だけを超高速で同期する rsync コマンドに変更
    - name: Download DokuWiki pages
      env:
        SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        printenv SSH_KEY > private_key.pem
        chmod 400 private_key.pem
        mkdir -p wiki_data_support/pages
        # rsync を使って変更があったファイルだけを高速ダウンロード
        rsync -e "ssh -p 8022 -i private_key.pem -o StrictHostKeyChecking=no -o BatchMode=yes" -rtz --delete ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/c6600173/public_html/support.codeofgenius.net/data/pages/ ./wiki_data_support/pages/
        rm -f private_key.pem

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Link Checker
      env:
        WIKI_DATA_DIR: 'wiki_data_support/pages'
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        GAS_SECURITY_TOKEN: ${{ secrets.GAS_SECURITY_TOKEN }}
      run: python link_checker.py