name: DokuWiki Link Checker (support)

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜日の朝9時（日本時間）に自動実行
  workflow_dispatch:      # ボタンを押して手動でいつでも実行可能

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download DokuWiki pages
      uses: garygrossgarten/github-action-sftp@release
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: 8022
        username: ${{ secrets.SERVER_USER }}
        privateKey: ${{ secrets.SERVER_SSH_KEY }}
        relative: false
        # 💡 supportサイトの正確な住所を指定
        remote: '/home/c6600173/public_html/support.codeofgenius.net/data/pages/'
        local: 'wiki_data_support/'
        command: 'download'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Link Checker
      env:
        WIKI_DATA_DIR: 'wiki_data_support'
        GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        GAS_SECURITY_TOKEN: ${{ secrets.GAS_SECURITY_TOKEN }}
      run: python link_checker.py